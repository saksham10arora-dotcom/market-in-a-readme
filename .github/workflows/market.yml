name: market

on:
  issues:
    types: [opened]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: market-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install PyGithub matplotlib

      - name: run matching engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python market.py

      - name: regenerate charts
        run: python charts.py

      - name: commit changes
        run: |
          git config user.name "market-bot"
          git config user.email "market-bot@users.noreply.github.com"
          git add state.json README.md assets/
          git diff --staged --quiet || git commit -m "market: update order book [skip ci]"
          git pull --rebase origin main
          git push
